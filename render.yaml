services:
  - type: web
    name: rag-hybrid-search
    env: docker
    plan: free
    healthCheckPath: /health/live
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: RAG_ENVIRONMENT
        value: production
      - key: RAG_PROVIDER
        value: nvidia
      - key: RAG_RERANK_BACKEND
        value: nvidia
      - key: RAG_STORAGE_BACKEND
        value: pinecone
      - key: RAG_DEBUG_TOKEN
        sync: false
      - key: RAG_PINECONE_API_KEY
        sync: false
      - key: RAG_PINECONE_INDEX_NAME
        sync: false
      - key: RAG_NVIDIA_API_KEY
        sync: false
      - key: RAG_API_KEYS
        sync: false
