  category: comparative
  expected:
    answer: The EU AI Act uses a fixed regulatory risk-tier classification (unacceptable/high/limited/minimal) with binding legal obligations per tier, whereas NIST SP 800-37's Risk Management Framework is a voluntary process-oriented framework for categorizing and managing risk to federal information systems, not specific to AI and not legally binding in the same way.
