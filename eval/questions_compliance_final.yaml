dataset:
  name: compliance-corpus-v1
  version: 1.0.0
questions:
- id: q001
  question: Under GDPR, what is the maximum administrative fine for infringements of the basic principles for processing, including conditions for consent?
  category: factual
  expected:
    answer: Up to 20,000,000 EUR, or up to 4% of total worldwide annual turnover of the preceding financial year, whichever is higher.
    citation_doc_ids:
    - 55c74e72211c5520043bb3775fbc98b507fd38ad16e61828fa07eb179e75134c
- id: q002
  question: What is a data subject's right under GDPR to receive their personal data in a structured, commonly used, machine-readable format?
  category: definition
  expected:
    answer: The right to data portability.
    citation_doc_ids:
    - 55c74e72211c5520043bb3775fbc98b507fd38ad16e61828fa07eb179e75134c
- id: q003
  question: How does the EU AI Act categorize risk for AI systems, and what are the main risk tiers?
  category: summarization
  expected:
    answer: 'The EU AI Act uses a risk-based tiered approach: unacceptable risk (prohibited practices), high-risk AI systems (subject to strict obligations), limited risk (transparency obligations), and minimal risk (largely unregulated).'
    citation_doc_ids:
    - a0f990772507d97095753a7765529c139542bb9e2020d716c517b51e06e3f5d3
- id: q004
  question: What obligations does the EU AI Act place on providers of high-risk AI systems?
  category: factual
  expected:
    answer: Providers of high-risk AI systems must implement a risk management system, ensure data governance and quality, maintain technical documentation, enable record-keeping/logging, provide transparency and instructions for use, ensure human oversight, and meet accuracy, robustness, and cybersecurity requirements.
    citation_doc_ids:
    - a0f990772507d97095753a7765529c139542bb9e2020d716c517b51e06e3f5d3
- id: q005
  question: How does the 5th Anti-Money Laundering Directive (AMLD5) amend the 4th AML Directive (AMLD4) regarding virtual currencies?
  category: comparative
  expected:
    answer: AMLD5 extends AML obligations to providers engaged in exchange services between virtual currencies and fiat currencies, and to custodian wallet providers, which were not covered under AMLD4.
    citation_doc_ids:
    - 6b816640fc114dddf1ee4298143a971e04d37aae2af3897b7fa4417be013f0e8
    - d34f58f45400f5915224d11ca5731910ccc820d178648c8a294af7c9c59ef621
- id: q006
  question: What is the key structural difference between AMLD4 and AMLD5 in terms of beneficial ownership registers?
  category: comparative
  expected:
    answer: AMLD5 requires broader public access to beneficial ownership registers for companies and introduces registers for trusts, going beyond AMLD4's more limited access provisions.
    citation_doc_ids:
    - 6b816640fc114dddf1ee4298143a971e04d37aae2af3897b7fa4417be013f0e8
    - d34f58f45400f5915224d11ca5731910ccc820d178648c8a294af7c9c59ef621
- id: q007
  question: What are the three pillars of the Basel Framework?
  category: factual
  expected:
    answer: Pillar 1 (minimum capital requirements), Pillar 2 (supervisory review process), and Pillar 3 (market discipline/disclosure requirements).
    citation_doc_ids:
    - 5a5bda25e54a33b34872be13cdc61d4b4b4702fd44199b0c0da4da0a665594a3
- id: q008
  question: How do climate-related risk drivers, per the Basel Committee's guidance, transmit into traditional financial risk categories?
  category: multi-hop
  expected:
    answer: Climate-related risk drivers (physical and transition risks) transmit into traditional risk categories such as credit risk, market risk, operational risk, and liquidity risk, as described in the Basel Committee's climate risk transmission channels document, which cross-references the Basel Framework's chapters on those risk categories.
    citation_doc_ids:
    - 91808df6c1b6473b6b651a32b0d57c5867b9ef82ed42bce9921c9cc7f145abdb
    - 0ff411f6b5bc9362b9a5ba07a7d6168fc0cea547e0bfb44dad437dbd801f8685
- id: q009
  question: What changed in the structure of the consolidated Basel Framework between the 2019 and 2024 editions?
  category: comparative
  expected:
    answer: The structure map documents evolved to reflect newly added or reorganized chapters as the Basel Committee published new standards over time; the 2024 structure reflects a more current and expanded chapter set than the 2019 version.
    citation_doc_ids:
    - 09554073b6fb42ab32e6f90714fa94c2c3e434369005dea31a0ccfd0abbbe2f1
    - 8eb193306e83027138b9e56dd1e4a1644f5d528841bce362cddae5074fbedcc4
- id: q010
  question: What does Regulation B (12 CFR Part 1002) prohibit under the Equal Credit Opportunity Act?
  category: factual
  expected:
    answer: It prohibits creditors from discriminating against credit applicants on the basis of race, color, religion, national origin, sex, marital status, age, receipt of public assistance income, or exercise of rights under the Consumer Credit Protection Act.
    citation_doc_ids:
    - 455f8b54df73381362a794e34d70b68ec5b0bfdec1f13144714143eb391290d2
- id: q011
  question: What consumer protections does Regulation E (12 CFR Part 1005) provide for electronic fund transfers?
  category: factual
  expected:
    answer: Regulation E establishes rights, liabilities, and responsibilities for participants in electronic fund transfer systems, including error resolution procedures, disclosure requirements, and limits on consumer liability for unauthorized transfers.
    citation_doc_ids:
    - 37970f9b45b716b8fa130f886a84198c3584c19eac79d1805ef31f2568c7dec3
- id: q013
  question: What disclosures does Regulation Z (12 CFR Part 226) require under the Truth in Lending Act?
  category: factual
  expected:
    answer: Regulation Z requires creditors to disclose credit terms including the annual percentage rate (APR), finance charges, amount financed, total of payments, and payment schedule, so consumers can compare credit costs across lenders.
    citation_doc_ids:
    - 0f8eb7691149464408c28984259dbe6b554dfb8901905c0be2b5ddfce8f3035b
- id: q014
  question: What is the purpose of the general definitions in 45 CFR Part 160 relative to HIPAA's Part 164 rules?
  category: multi-hop
  expected:
    answer: 45 CFR Part 160 establishes the general administrative requirements and definitions (e.g. covered entity, business associate) that are referenced throughout Part 164's Privacy, Security, and Breach Notification Rules.
    citation_doc_ids:
    - a957fbf8584e885eb7db0afde5896f8a14400feeba892edd4640044ff0829fa8
    - a87b2afe059745c5ddfeb1652c4c9e2c3d75d1fa30699f98d8470e889dc86936
- id: q015
  question: What are the three main rules established under 45 CFR Part 164?
  category: summarization
  expected:
    answer: The Privacy Rule, the Security Rule, and the Breach Notification Rule.
    citation_doc_ids:
    - a87b2afe059745c5ddfeb1652c4c9e2c3d75d1fa30699f98d8470e889dc86936
- id: q016
  question: How does the Consumer Credit Directive II (2023/2225) differ from the original Consumer Credit Directive (2008/48/EC)?
  category: comparative
  expected:
    answer: CCD II (2023/2225) explicitly repeals and replaces CCD I (2008/48/EC), broadening scope to cover additional credit products (e.g. certain low-value and buy-now-pay-later type agreements) and strengthening creditworthiness assessment and pre-contractual information requirements.
    citation_doc_ids:
    - 9f72bb2b0f77a5bf3e78a684280911ffb4808fee74c1afd189ef34c3aca836b3
    - e2ee0b03450588c09c0347ee68b22ff8bcd4346861425ace6a9bb618ec3950f4
- id: q017
  question: What is the relationship between the Capital Requirements Directive IV (CRD IV) and the Capital Requirements Regulation (CRR)?
  category: comparative
  expected:
    answer: 'CRD IV and the CRR are companion EU legislative instruments implementing Basel III in EU law together: the CRR is directly applicable and sets detailed prudential requirements, while CRD IV is a directive requiring national transposition, covering areas like capital buffers, governance, and supervisory powers.'
    citation_doc_ids:
    - 14286b30e46e5a4ae252cac033b446936ca12b8dd74c967e2b3b14b6ccf7397a
    - 2cf35967bcc016cc8480af7606d30870d731010e8eb07bfa127935454109cbe6
- id: q018
  question: What did CRR2 (Regulation 2019/876) amend in the original CRR (575/2013)?
  category: comparative
  expected:
    answer: CRR2 amended the original CRR article-by-article, introducing changes such as a binding leverage ratio requirement, a net stable funding ratio (NSFR) requirement, and revised market risk and counterparty credit risk frameworks.
    citation_doc_ids:
    - 2cf35967bcc016cc8480af7606d30870d731010e8eb07bfa127935454109cbe6
    - caf32fe07f48dac1ed28270282d1ad076573b17a80c1677a9b090c59b5185cf0
- id: q019
  question: What does the Corporate Sustainability Reporting Directive (CSRD) amend?
  category: factual
  expected:
    answer: The CSRD amends the Accounting Directive, the Transparency Directive, and the Audit Directive to expand and standardize corporate sustainability reporting requirements.
    citation_doc_ids:
    - d236efbc3f73dbdd468757b61b9eab1f92794371da91067a983022c5bf2951dd
- id: q020
  question: What are the major titles/areas of reform covered by the Dodd-Frank Wall Street Reform Act?
  category: summarization
  expected:
    answer: Dodd-Frank covers areas including financial stability oversight, orderly liquidation authority, the Volcker Rule, derivatives regulation, creation of the CFPB, credit rating agency reform, and executive compensation/corporate governance reforms, among many other titles.
    citation_doc_ids:
    - 9f391f20bfdd4d1e60c3d7b0759917e03f05fa614a31aa599a938484791d420d
- id: q021
  question: What is the difference between the original Dodd-Frank Public Law text and the compiled/current version?
  category: comparative
  expected:
    answer: The original Public Law (111-203) text is the act as enacted in 2010, while the compiled/current version reflects subsequent amendments integrated into the operative text over time.
    citation_doc_ids:
    - 9f391f20bfdd4d1e60c3d7b0759917e03f05fa614a31aa599a938484791d420d
    - ac98097542b013f87e699b3ab6147e46fee96c05b50dc4e415cda00bb20adb6f
- id: q022
  question: What does DORA (Regulation 2022/2554) require of financial entities regarding ICT risk?
  category: factual
  expected:
    answer: DORA requires financial entities to establish a comprehensive ICT risk management framework, report major ICT-related incidents, conduct digital operational resilience testing, and manage third-party ICT risk, including oversight of critical ICT third-party providers.
    citation_doc_ids:
    - c3c3b00183c324bcc351de670ed34c20f517f8bdc68967ff41037d098244d00b
- id: q023
  question: What does EMIR (Regulation 648/2012) require for OTC derivatives?
  category: factual
  expected:
    answer: EMIR requires central clearing of standardized OTC derivatives contracts, risk mitigation techniques for non-centrally-cleared contracts, and reporting of derivatives contracts to trade repositories.
    citation_doc_ids:
    - bead1843e9b6bc7aca27a08d64c1081ca3f432779eaa905d784803871515d1d0
- id: q024
  question: How did Directive 2009/136/EC amend the original ePrivacy Directive (2002/58/EC)?
  category: comparative
  expected:
    answer: Directive 2009/136/EC (the 'Citizens' Rights Directive') amended the ePrivacy Directive to strengthen rules on cookies (requiring consent), data breach notification for telecom providers, and enforcement powers.
    citation_doc_ids:
    - 536a625aee5567d56bf3608c005da7cc7f448de495efb6e33d577cae53c76c10
    - 50ecac22edd85896221f2f08fd9d28bacac805adc52d1c51fa115fc6d2a0b786
- id: q025
  question: What is the difference between the original Fair Credit Reporting Act text and its compiled current version?
  category: comparative
  expected:
    answer: The compiled current version (fcra_comps) integrates all amendments made since original enactment into a single up-to-date text, while the original text reflects only the law as first passed.
    citation_doc_ids:
    - 27abd8798c4b068db556709c8f7af777e91ac390b97ee23e499bab1473a2bafd
- id: q026
  question: What is the SR 12-17 Consolidated Supervision Framework primarily about?
  category: summarization
  expected:
    answer: SR 12-17 describes the Federal Reserve's framework for consolidated supervision of large financial institutions, emphasizing a firm-wide view of risk across the entire organization rather than only its individual legal entities.
    citation_doc_ids:
    - 08ac92421ebd0177da049c7852a2fa7df103132a1ba3f2a33e7efd8105e417a2
- id: q027
  question: How does SR 26-2 relate to SR 11-7 on model risk management?
  category: comparative
  expected:
    answer: SR 26-2 is the Federal Reserve's revised guidance on model risk management, updating and superseding aspects of the earlier SR 11-7 guidance.
    citation_doc_ids:
    - 60b44aee56cd707770f1d393791028582bb3b4dd781d6ff30b1607c095095a4b
- id: q028
  question: What distinguishes SR 98-9 from more recent Federal Reserve guidance in terms of era and formatting?
  category: factual
  expected:
    answer: SR 98-9 is a legacy 1998 guidance document on assessment of information security, reflecting older formatting/typography conventions compared to more recent SR letters.
    citation_doc_ids:
    - 5dc994e6eb8c538c64aa44614016c0bb3d88ff700071ac0ecad30e50d01a3478
- id: q029
  question: How does the FINRA 2014 Rules Reference Guide compare to the 2019 version in terms of currency?
  category: comparative
  expected:
    answer: The 2014 guide is an earlier point in FINRA's advertising/rules reference guide version chain, and the 2019 guide reflects updated rule numbering and content current as of 2019 -- the 2014 version would be outdated for current compliance use.
    citation_doc_ids:
    - 8ce0f6701b79ea2898beee94cd4dddad79f8d7a4b44178012cc611b3a6962a11
    - ffaf2f90326625ccec8248664c612171a22ccc8da5b69a0e1496826f540e3b02
- id: q030
  question: What does FINRA Rule 2210 govern?
  category: factual
  expected:
    answer: FINRA Rule 2210 governs communications with the public, including standards for advertising, correspondence, and other communications by member firms.
    citation_doc_ids:
    - 8be3149c74fc7cefa848f87547d47b7066c2f4d1806ca2b2af0140da4473cfe0
- id: q032
  question: What is the relationship between the Investment Firms Regulation (IFR) and the Investment Firms Directive (IFD)?
  category: comparative
  expected:
    answer: IFR and IFD are companion EU legislative instruments for investment firm prudential requirements, analogous to the CRR/CRD IV relationship for credit institutions; IFR sets directly applicable prudential rules while IFD covers matters requiring national transposition such as supervisory powers.
    citation_doc_ids:
    - f1b3c3b5825fc2e6861702b23e85c97728a3bf66fb9da7400951a3faed49b393
    - 23a944882d9723d5e398639b4edb1fa14e74623309fdc5a1a6009bb89f8316dd
- id: q033
  question: What does the Market Abuse Regulation (596/2014) prohibit?
  category: factual
  expected:
    answer: It prohibits insider dealing, unlawful disclosure of inside information, and market manipulation.
    citation_doc_ids:
    - fb1775c7a1efe6c287795af6e16b87a1fb49a8f0c294894afa3ace50743a4b05
- id: q034
  question: What is the relationship between MiFID II and MiFIR?
  category: comparative
  expected:
    answer: 'MiFID II (Directive 2014/65/EU) and MiFIR (Regulation 600/2014) are companion instruments regulating EU financial markets and investment services: MiFID II requires national transposition and covers matters like investor protection and market structure, while MiFIR is directly applicable and covers matters like transparency and reporting requirements.'
    citation_doc_ids:
    - 71328095ab6d5be33d70508fd987bc8e5bc4cbb3cea5ef6fc831f27d12bb658d
    - 8c867d9dd1c7418e1adeb38945bc2c8f7bea0bbcdc52b538a024950b47d1c501
- id: q035
  question: What does the NIS2 Directive repeal and replace?
  category: factual
  expected:
    answer: NIS2 (Directive 2022/2555) repeals and replaces the original NIS Directive (NIS1), expanding scope and strengthening cybersecurity requirements for essential and important entities.
    citation_doc_ids:
    - bedf1e8c7bfaa776dd8435b137684d29d6897d79336873dbab97296b58f93d24
- id: q036
  question: How do FIPS 199 and FIPS 200 relate to each other and to NIST SP 800-53?
  category: multi-hop
  expected:
    answer: FIPS 199 establishes standards for categorizing information and information systems by security impact level; FIPS 200 defines minimum security requirements based on those categorizations; both feed into NIST SP 800-53, which provides the detailed security and privacy control catalog referenced by FIPS 200's minimum requirements.
    citation_doc_ids:
    - da00c908c378a32d424f9d0ed911a29b96596f8a52e3031725e2a53dfa65367c
    - fc2de4faed8e9626915f9e3aa3d17c43e9def332abffd7b75c2261e8629051f4
    - 3cab929a32634ca81409b458979cb37fe2ef83491ff5e90395c2612024b38920
- id: q037
  question: What is the purpose of NIST SP 800-137?
  category: factual
  expected:
    answer: NIST SP 800-137 provides guidance on Information Security Continuous Monitoring (ISCM) for federal information systems and organizations, referencing control families from SP 800-53.
    citation_doc_ids:
    - 40e0ad06fed39f0469dddb6c8096535d6283d86e3e2b25f1f24cad6909af784b
- id: q038
  question: How did NIST SP 800-171 evolve from its original version through Revision 3?
  category: multi-hop
  expected:
    answer: SP 800-171 was first published to define requirements for protecting Controlled Unclassified Information (CUI) in nonfederal systems; Revision 1 made moderate updates; Revision 2 was later withdrawn in 2024; Revision 3 is the current version, superseding Revision 2.
    citation_doc_ids:
    - 3bd71b1b5ba72a2e7c918b2714a0ed23dcbb9c68059c81bb88324f8976626297
    - 15d6beb1194a51d5ab406751c78517247c0ec5278ca038b1741a20748e115b9b
    - 42cdb4f2f6b1096600ef9ab2dda26c3bb2f942862fc41ac0f85ab903eaddd54e
    - 2b71853a04ccb00a8b4384ca231116bf52471557fce7d21a9793eefe450adb9b
- id: q039
  question: What is the purpose of NIST SP 800-171A Revision 3 relative to SP 800-171 Revision 3?
  category: multi-hop
  expected:
    answer: SP 800-171A Rev.3 provides assessment procedures for verifying compliance with the security requirements defined in SP 800-171 Rev.3, cross-referencing its requirement IDs.
    citation_doc_ids:
    - 72b0f686b8ca4727e459b89cd06c1215100b13d5d36d3c18d06b70937fa5252b
    - 2b71853a04ccb00a8b4384ca231116bf52471557fce7d21a9793eefe450adb9b
- id: q040
  question: What is Zero Trust Architecture as described in NIST SP 800-207?
  category: definition
  expected:
    answer: Zero Trust Architecture is a security model that assumes no implicit trust based on network location, instead requiring continuous verification of every access request regardless of whether it originates inside or outside the network perimeter.
    citation_doc_ids:
    - 6f0b96bdcfe33625afef5596e654937b127da5f3d9fa38b00fcacd8825ffe12e
- id: q041
  question: How does NIST SP 800-37 Revision 2 (Risk Management Framework) relate to SP 800-53, SP 800-30, and SP 800-39?
  category: multi-hop
  expected:
    answer: SP 800-37 Rev.2 describes the Risk Management Framework process, referencing SP 800-53 for the security control catalog, SP 800-30 for risk assessment guidance, and SP 800-39 for the top-level organizational risk management approach.
    citation_doc_ids:
    - a43006195817485fd19bd349cd5cbfbad9cbbbbf399b279f89c3d98403185d5e
    - 3cab929a32634ca81409b458979cb37fe2ef83491ff5e90395c2612024b38920
    - be1e355caccd5bf40ea5c47a145c511879ee00c4f949f3909949d9cd58d2c63f
- id: q042
  question: What is the relationship between NIST SP 800-53 and SP 800-53A?
  category: comparative
  expected:
    answer: SP 800-53 defines the security and privacy control catalog organized into 20 control families; SP 800-53A provides the assessment procedures for verifying that those controls in SP 800-53 have been implemented correctly.
    citation_doc_ids:
    - 3cab929a32634ca81409b458979cb37fe2ef83491ff5e90395c2612024b38920
    - 110d4983d4992e0c58d06eb51b5508012cddc5ed802efac58d7b3b2fa9335d2b
- id: q043
  question: What does NIST SP 800-61 Revision 2 cover?
  category: factual
  expected:
    answer: It provides guidelines for computer security incident handling, covering incident response policy, incident detection/analysis, containment/eradication/recovery, and post-incident activity, referencing other SP 800-series documents and legal/forensic guidance.
    citation_doc_ids:
    - 60f61c4c980344c57f9aabea6262307d0226566e7a3d7cf8efffc8f7f780085a
- id: q044
  question: How does NIST SP 800-63-3 relate to SP 800-63B?
  category: multi-hop
  expected:
    answer: SP 800-63-3 is the umbrella Digital Identity Guidelines document, referencing companion volumes including SP 800-63B, which specifically covers authentication and authenticator lifecycle management, including Authenticator Assurance Levels (AALs).
    citation_doc_ids:
    - cac6c187d043a08ba2940d766880c50c3d7a00b5b60f20824b8652fd3cb7eafb
    - 941f2044d9a89b2051980792a2e509726fec07105553de42780458c3eedb6e9b
- id: q045
  question: What does NIST SP 800-88 Revision 1 provide guidance on?
  category: factual
  expected:
    answer: It provides guidelines for media sanitization, including recommended sanitization methods (clear, purge, destroy) organized by media type.
    citation_doc_ids:
    - bf3370f9709c11ce088433bfc8f57c58f6c80f4ef0cc54d63d7467488f6c5c8b
- id: q046
  question: What is covered in the OCC Comptroller's Handbook booklet on Asset Securitization?
  category: factual
  expected:
    answer: It covers the complex structured-finance topic of asset securitization, including detailed risk considerations and examination guidance, presented with detailed tables.
    citation_doc_ids:
    - 00a442584f4da06b73e1854e1a90e038b7d659c5db91120b7231a8fe5542720b
- id: q047
  question: What is the difference between the current and previous editions of the OCC Bank Supervision Process booklet?
  category: comparative
  expected:
    answer: The current edition reflects the OCC's up-to-date central examiner reference for bank supervision, superseding the prior edition which remains available for historical reference but is no longer the operative guidance.
    citation_doc_ids:
    - 759416c307f4561dec589ea41967c0a9944ff8c51a4ee8db6a2dcc94b04dde45
    - 992a59e5fb72f937fdad7cd918cc3e6aac5b6abb392cb31b89104ea414556a74
- id: q048
  question: What does the current OCC Capital and Dividends booklet reference regarding regulatory capital?
  category: multi-hop
  expected:
    answer: It cross-references Basel-based regulatory capital rule sections in assessing a bank's capital adequacy and dividend practices.
    citation_doc_ids:
    - 478cff7bd4686d4751da6973b002f609523e415f16b2a978639a8b5b9afb7160
- id: q049
  question: What is different between the current and previous editions of the OCC Community Bank Supervision booklet?
  category: comparative
  expected:
    answer: The current edition supersedes the previous edition as the OCC's operative guidance for community bank supervision, reflecting updated examination procedures.
    citation_doc_ids:
    - d6519129773cd7518b2a4ebb6ce146fbbd10515255d4ac28639c930b5043ad98
    - 8a346cfaf51291e597e181cc002b94bcf8c15ea8b67fedf5d80b7c78bb5ba001
- id: q050
  question: What does the OCC Compliance Management Systems booklet cover?
  category: factual
  expected:
    answer: It covers the components and expectations for a bank's compliance management system, cross-referencing consumer protection statutes throughout.
    citation_doc_ids:
    - 83791c16341321763d340786bb8054df7a961d59ee7977ece126a816a4e84f8a
- id: q051
  question: What is distinctive about the OCC Custody Services booklet compared to more recent OCC handbook booklets?
  category: factual
  expected:
    answer: It is a 2002-era booklet reflecting legacy formatting and typography compared to more recently issued OCC Comptroller's Handbook booklets.
    citation_doc_ids:
    - 114f55c75287427024e02903df7d0526315bb96fc5ee9aa0b7a93f228478c4d9
- id: q052
  question: What statutes does the current OCC Fair Lending booklet cross-reference?
  category: multi-hop
  expected:
    answer: It cross-references the Fair Housing Act, the Equal Credit Opportunity Act (ECOA), and Regulation B.
    citation_doc_ids:
    - 4cd4bce32382b4aa7372a4e4ffe106d1a2ef02d2fc4b70e053efd24bde1a8790
    - 455f8b54df73381362a794e34d70b68ec5b0bfdec1f13144714143eb391290d2
- id: q053
  question: What does the current OCC Interest Rate Risk booklet explicitly note about the booklet it replaces?
  category: comparative
  expected:
    answer: The current booklet explicitly notes it replaces the 1997 booklet on interest rate risk, an explicit supersession noted in the text itself.
    citation_doc_ids:
    - 42b6bdaa8154032a06cd6c276a76a05d803d655c2e7a56ef5f7a0d8f91c6ea74
    - ed546f16fb56cb0f91c8fd34bdee5a9cad5f77616f5e2299bcbf5ae726597b19
- id: q054
